version: '3.8'

services:
  # NestJS Backend
  backend_app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bookify_backend
    restart: always
    ports:
      - '3000:3000'
    env_file:
      - ./backend/.env
    environment:
      - DB_HOST=mysql_db 
      - REDIS_HOST=redis_cache 
    volumes:
      - ./backend:/app
      - /app/node_modules
    depends_on:
      - mysql_db
      - redis_cache
  # Database MySQL
  mysql_db:
    image: mysql:8.0
    container_name: bookify_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - '3306:3306'
    volumes:
      - mysql_data:/var/lib/mysql

  # Cache Redis
  redis_cache:
    image: redis:alpine
    container_name: bookify_redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
  redis-insight:
    image: redis/redisinsight:latest
    ports:
      - '8001:8001'
    environment:
      - RI_APP_HOST=0.0.0.0  # Ép nó lắng nghe trên mọi địa chỉ
      - RI_APP_PORT=8001
    depends_on:
      - redis_cache

volumes:
  mysql_data:
  redis_data: